name: Deploy static content to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax check JS files
        run: |
          node --check app.js
          node --check sync.js
          node --check sw.js
          node --check motivationProgramV2.js

      - name: Check panel.html script tag balance
        run: |
          OPEN=$(grep -o '<script' panel.html | wc -l)
          CLOSE=$(grep -o '</script>' panel.html | wc -l)
          echo "script open=$OPEN close=$CLOSE"
          [ "$OPEN" -eq "$CLOSE" ]

      - name: Headless render test
        run: node .claude/skills/run-seyma/driver.mjs

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
