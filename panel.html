<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Seyma · Observer Dashboard</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  :root{
    --bg:#060609;--s1:#0d0d14;--s2:#14141d;--s3:#1a1a25;
    --bd:rgba(255,255,255,0.08);--bd2:rgba(255,255,255,0.05);
    --t1:#f5f0ea;--t2:#d4cdc4;--t3:#8a847c;
    --gold:#d4af37;--ga:rgba(212,175,55,.10);--gb:rgba(212,175,55,.20);
    --green:#34d399;--gra:rgba(52,211,153,.08);--grb:rgba(52,211,153,.18);
    --amber:#fbbf24;--aa:rgba(251,191,36,.08);--ab:rgba(251,191,36,.18);
    --red:#fb7185;--ra:rgba(251,113,133,.08);--rb:rgba(251,113,133,.18);
    --pink:#f472b6;--purple:#a78bfa;
    --r:10px;
  }
  html,body{height:100%;background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","Inter",system-ui,sans-serif;overflow:hidden;-webkit-font-smoothing:antialiased}
  .topbar{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(6,6,9,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);padding:0 16px;height:44px;display:flex;align-items:center;justify-content:space-between}
  .page{position:fixed;top:44px;left:0;right:0;bottom:0;overflow-y:auto;overflow-x:hidden;padding:10px 12px 16px}
  .card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r)}
  .btn{background:var(--s2);border:1px solid var(--bd);color:var(--t2);padding:5px 11px;border-radius:7px;font-weight:600;font-size:11px;cursor:pointer;transition:all .15s}
  .btn:hover{background:var(--s3);color:var(--t1)}
  .badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.2px}
  .b-ok{background:var(--gra);color:var(--green);border:1px solid var(--grb)}
  .b-warn{background:var(--aa);color:var(--amber);border:1px solid var(--ab)}
  .b-danger{background:var(--ra);color:var(--red);border:1px solid var(--rb)}
  .b-gold{background:var(--ga);color:var(--gold);border:1px solid var(--gb)}
  .b-dim{background:rgba(255,255,255,0.03);color:var(--t3);border:1px solid var(--bd)}
  .seg{display:flex;gap:3px}
  .seg button{background:var(--s2);border:1px solid var(--bd2);color:var(--t3);padding:3px 8px;border-radius:6px;font-weight:700;font-size:10px;cursor:pointer;transition:all .15s}
  .seg button.active{border-color:var(--gb);background:var(--ga);color:var(--gold)}
  .seg button:hover:not(.active){color:var(--t2)}
  .mono{font-variant-numeric:tabular-nums}
  .chart{width:100%;display:block}

  /* Bento Grid */
  .bento{display:grid;grid-template-columns:repeat(12,1fr);gap:8px}
  .bento>.span-3{grid-column:span 3}
  .bento>.span-4{grid-column:span 4}
  .bento>.span-5{grid-column:span 5}
  .bento>.span-6{grid-column:span 6}
  .bento>.span-7{grid-column:span 7}
  .bento>.span-8{grid-column:span 8}
  .bento>.span-12{grid-column:span 12}

  /* Metric tile */
  .mtile{padding:10px 12px}
  .mtile .mv{font-size:22px;font-weight:800;line-height:1.1;letter-spacing:-.5px}
  .mtile .ml{font-size:9px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-top:3px}

  .lbl{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.6px;text-transform:uppercase;margin-bottom:5px}
  .divider{height:1px;background:var(--bd2);margin:6px 0}

  input[type="date"],input[type="month"],input[type="password"]{background:var(--s2);border:1px solid var(--bd);color:var(--t1);border-radius:6px;padding:4px 8px;font:inherit;outline:none;font-size:11px;color-scheme:dark}

  #loc-map{height:100%;min-height:180px;border-radius:8px;overflow:hidden;border:1px solid var(--bd);background:#08080e}
  .loc-live{background:var(--gra);color:var(--green);border:1px solid var(--grb)}
  .loc-old{background:var(--aa);color:var(--amber);border:1px solid var(--ab)}
  .loc-none{background:rgba(255,255,255,0.03);color:var(--t3);border:1px solid var(--bd)}

  .habit-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  .row{display:flex;align-items:center;gap:6px;padding:4px 5px;border-radius:6px;cursor:pointer;font-size:11px}
  .row:hover{background:var(--s2)}

  @media(max-width:1100px){
    .bento>.span-3{grid-column:span 4}
    .bento>.span-5,.bento>.span-7{grid-column:span 6}
    .bento>.span-8{grid-column:span 12}
  }
  @media(max-width:768px){
    .bento>.span-3,.bento>.span-4,.bento>.span-5,.bento>.span-6,.bento>.span-7,.bento>.span-8{grid-column:span 12}
  }
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
</head>
<body>
<div id="app"><div class="card" style="padding:18px;text-align:center;margin:40px 16px;">Yükleniyor…</div></div>
<script>
(function(){
"use strict";
var qs=new URLSearchParams(location.search);
var REPO=qs.get("repo")||"mustafaras/seyma-data";
var BRANCH=qs.get("branch")||"main";
var PTKEY="seyma-panel-token";
var APPKEY="seyma-reset-v1";
var PTOKEN="";
var D=null;
var UI={range:30,selectedDate:null,month:null};
var HABITS=[["sweetManaged","Tatlı"],["eveningControl","Aksam"],["walked20","Yuruyus"],["protein","Protein"],["water","Su"],["vitaminD","D vitamini"],["selfKind","Kendine iyi"]];
var HT=HABITS.length;
var MOOD_EMOJI={"cok-iyi":"☀️","iyi":"🌼","normal":"🌿","zorlandim":"🌧️","cok-zorlandim":"🫧"};
var SLEEP_Q={good:"Dinç",ok:"Idare",bad:"Yorgun"};
var SLEEP_MED={none:"Hayir",herbal:"Bitkisel/Melatonin",rx:"Receteli"};
var WIND_KEYS=["light","breath","dump","cool"];
var FLOW={spot:"Leke",light:"Hafif",medium:"Orta",heavy:"Yogun"};
var SYM={kramp:"Kramp",bas:"Bas agrisi",siskinlik:"Siskinlik",yorgun:"Yorgunluk",duygu:"Duygusal",istah:"Istah",sanci:"Sanci",cilt:"Cilt"};

function normalizeToken(v){ return String(v||"").replace(/[^\x20-\x7E]/g,"").trim(); }
function pad(n){ return (n<10?"0":"")+n; }
function fmt(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function today(){ return fmt(new Date()); }
function addDays(s,n){ var p=s.split("-").map(Number),d=new Date(p[0],p[1]-1,p[2]); d.setDate(d.getDate()+n); return fmt(d); }
function diff(a,b){ var pa=a.split("-").map(Number),pb=b.split("-").map(Number); return Math.round((new Date(pb[0],pb[1]-1,pb[2])-new Date(pa[0],pa[1]-1,pa[2]))/86400000); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function panelReadiness(rec){
  var sl=rec&&rec.sleep?rec.sleep:{};
  var wind=sl.windDown||{};
  var steps=wind.steps||{};
  var completed=WIND_KEYS.reduce(function(a,k){ return a+(steps[k]?1:0); },0);
  var hours=(sl.hours!=null&&!isNaN(Number(sl.hours)))?Number(sl.hours):null;
  var fDur=hours!=null?Math.round(28*Math.max(0,Math.min(1,1-Math.abs(hours-7.75)/3))):0;
  var fQual=sl.quality==="good"?16:(sl.quality==="ok"?9:(sl.quality==="bad"?3:0));
  var fSteps=Math.round(20*(completed/WIND_KEYS.length));
  var sessions=(wind.sessions&&wind.sessions.length)?wind.sessions:[];
  var done=false,partial=false;
  for(var i=0;i<sessions.length;i++){ if(sessions[i].completed) done=true; else partial=true; }
  if(!done&&wind.lastDoneAt) done=true;
  var fRit=done?20:(partial?10:0);
  var fOff=(wind.offloadNote&&String(wind.offloadNote).trim())?8:0;
  var medType=(sl.med&&sl.med.type)?sl.med.type:null;
  var fMed=medType==="none"?8:(medType==="herbal"?5:(medType==="rx"?2:4));
  var score=Math.max(0,Math.min(100,fDur+fQual+fSteps+fRit+fOff+fMed));
  return {score:score,completed:completed,ritualDone:done,partial:partial,medType:medType,sessions:sessions.length};
}
function ritualStats(dates){
  var doneDays=0,sessTotal=0,scoreSum=0,scoreDays=0,medDays=0;
  dates.forEach(function(d){ var r=recOf(d); if(!r||!r.sleep) return; var pr=panelReadiness(r); if(pr.ritualDone) doneDays++; sessTotal+=pr.sessions; if(r.sleep.hours!=null||r.sleep.quality||pr.completed>0||pr.sessions>0){ scoreSum+=pr.score; scoreDays++; } if(pr.medType&&pr.medType!=="none") medDays++; });
  return {doneDays:doneDays,sessTotal:sessTotal,avgScore:scoreDays?Math.round(scoreSum/scoreDays):0,medDays:medDays,scoreDays:scoreDays};
}
function shortD(s){ var p=s.split("-"); return p[2]+"."+p[1]; }
function monthKey(d){ return d.slice(0,7); }
function monthLabel(ym){ var p=ym.split("-").map(Number),m=["Ocak","Subat","Mart","Nisan","Mayis","Haziran","Temmuz","Agustos","Eylul","Ekim","Kasim","Aralik"]; return m[p[1]-1]+" "+p[0]; }
function recOf(d){ return D.days[d]||null; }
function cnt(rec){ return rec&&rec.habits?HABITS.reduce(function(a,h){return a+(rec.habits[h[0]]?1:0);},0):0; }
function avg(days,fn){ if(!days.length) return 0; return days.reduce(function(a,d){return a+fn(d);},0)/days.length; }
function sum(days,fn){ return days.reduce(function(a,d){return a+fn(d);},0); }
function formatDuration(sec){
  if(sec<60) return sec+" sn";
  if(sec<3600) return Math.round(sec/60)+" dk";
  var h=Math.floor(sec/3600), m=Math.round((sec%3600)/60);
  return h+" sa "+m+" dk";
}
function sessionStats(days){
  var totalActive=0, totalOpen=0, sessionCount=0;
  days.forEach(function(d){
    var rec=recOf(d);
    if(rec&&Array.isArray(rec.sessions)){
      rec.sessions.forEach(function(s){
        sessionCount++;
        if(s.activeSeconds) totalActive+=s.activeSeconds;
        if(s.start&&s.end) totalOpen+=(s.end-s.start)/1000;
      });
    }
    if(rec&&rec.liveSession&&rec.liveSession.activeSeconds){
      sessionCount++;
      totalActive+=Number(rec.liveSession.activeSeconds)||0;
      if(rec.liveSession.start&&rec.liveSession.lastSeen){
        totalOpen+=Math.max(0,(Number(rec.liveSession.lastSeen)-Number(rec.liveSession.start))/1000);
      }
    }
  });
  return {sessionCount:sessionCount,totalActive:totalActive,totalOpen:totalOpen,avgActive:sessionCount?Math.round(totalActive/sessionCount):0};
}
function spanEnd(){ var e=today(); for(var k in D.days){ if(diff(k,e)>0) e=k; } return e; }
function allDays(){ var out=[],n=Math.max(1,diff(D.startDate,spanEnd())+1); if(n>3000)n=3000; for(var i=0;i<n;i++) out.push(addDays(D.startDate,i)); return out; }
function windowDays(n,endDate){ var out=[],end=endDate||today(); for(var i=n-1;i>=0;i--) out.push(addDays(end,-i)); return out; }
function currentStreak(){ var c=0,d=today(); if(cnt(recOf(d))<4) d=addDays(d,-1); while(diff(D.startDate,d)>=0){ if(cnt(recOf(d))>=4){ c++; d=addDays(d,-1);} else break; } return c; }
function bestStreak(days){ var b=0,c=0; days.forEach(function(d){ if(cnt(recOf(d))>=4){ c++; if(c>b)b=c; } else c=0;}); return b; }
function lastSavedAt(){ var b=null; for(var k in D.days){ var s=D.days[k]&&D.days[k].savedAt; if(s&&(!b||s>b)) b=s; } return b; }
function freshness(saved){ if(!saved) return {klass:"warn",txt:"Baglanti var ama kayit bekleniyor"}; var mins=Math.max(0,Math.round((Date.now()-new Date(saved).getTime())/60000)); if(mins<=180) return {klass:"ok",txt:"Canli takip aktif"}; if(mins<=1440) return {klass:"warn",txt:"Bugun guncellendi"}; return {klass:"danger",txt:"Guncelleme gecikmis"}; }
function trend(now,prev){ var d=now-prev; if(Math.abs(d)<0.01) return "↔ "+d.toFixed(1); return (d>=0?"↑ ":"↓ ")+Math.abs(d).toFixed(1); }
function risk(days,saved){
  var a=avg(days,function(d){return cnt(recOf(d));});
  var s=sum(days,function(d){var r=recOf(d);return r&&r.cravingSOSCount?Number(r.cravingSOSCount):0;});
  var m=sum(days,function(d){var r=recOf(d);return r&&(r.mood==="zorlandim"||r.mood==="cok-zorlandim")?1:0;});
  var stale=!saved||(Date.now()-new Date(saved).getTime())>36*60*60*1000;
  var score=0; if(a<2.5)score+=2; else if(a<3.5)score+=1; if(s>=4)score+=2; else if(s>=2)score+=1; if(m>=3)score+=1; if(stale)score+=2;
  if(score<=1) return {klass:"ok",txt:"Dusuk risk"}; if(score<=3) return {klass:"warn",txt:"Orta risk"}; return {klass:"danger",txt:"Yakin takip"};
}
function sparkLine(days,valFn,max,color,h){
  var w=320,ht=h||60,p=4,iw=w-p*2,ih=ht-p*2,m=max||1;
  var pts=days.map(function(d,i){ var x=p+(days.length<=1?0:(i/(days.length-1))*iw), y=p+ih-(Math.max(0,valFn(d))/m)*ih; return [x,y]; });
  var poly=pts.map(function(a){return a[0].toFixed(1)+","+a[1].toFixed(1);}).join(" ");
  var area=pts.map(function(a){return a[0].toFixed(1)+","+a[1].toFixed(1);}).join(" ")+' '+(p+iw).toFixed(1)+','+(p+ih).toFixed(1)+' '+p+','+(p+ih).toFixed(1);
  var uid='sg'+Math.random().toString(36).slice(2,8);
  return '<svg viewBox="0 0 '+w+' '+ht+'" class="chart" preserveAspectRatio="none" style="border-radius:6px;"><defs><linearGradient id="'+uid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity=".22"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs><polygon points="'+area+'" fill="url(#'+uid+')"/><polyline fill="none" stroke="'+color+'" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" points="'+poly+'"/></svg>';
}
function sparkBar(days,valFn,max,color,h){
  var w=320,ht=h||50,p=2,iw=w-p*2,ih=ht-p*2,bw=Math.max(2,iw/days.length-1.5),m=max||1;
  var bars=days.map(function(d,i){ var v=Math.max(0,valFn(d)),bh=Math.max(1,(v/m)*ih),x=p+i*(iw/days.length)+.5,y=p+ih-bh; return '<rect x="'+x.toFixed(1)+'" y="'+y.toFixed(1)+'" width="'+bw.toFixed(1)+'" height="'+bh.toFixed(1)+'" rx="1.5" fill="'+color+'" opacity="'+(v?0.85:0.15)+'"/>'; }).join("");
  return '<svg viewBox="0 0 '+w+' '+ht+'" class="chart" preserveAspectRatio="none" style="border-radius:6px;">'+bars+'</svg>';
}
function monthDays(ym){
  var p=ym.split("-").map(Number),f=new Date(p[0],p[1]-1,1),l=new Date(p[0],p[1],0),out=[];
  var firstDow=(f.getDay()+6)%7; for(var i=0;i<firstDow;i++) out.push(null);
  for(var d=1;d<=l.getDate();d++) out.push(p[0]+"-"+pad(p[1])+"-"+pad(d));
  while(out.length%7!==0) out.push(null); return out;
}
function monthSummary(all){
  var map={}; all.forEach(function(d){ var k=monthKey(d),r=recOf(d); if(!map[k]) map[k]={days:0,ticks:0,sos:0}; map[k].days++; map[k].ticks+=cnt(r); map[k].sos+=(r&&r.cravingSOSCount?Number(r.cravingSOSCount):0); });
  return Object.keys(map).sort().reverse().map(function(k){ var m=map[k]; m.month=k; m.avg=m.days?m.ticks/m.days:0; return m; });
}

function setRange(n){ UI.range=n; render(); } window.setRange=setRange;
function setSelectedDate(v){ UI.selectedDate=v||today(); UI.month=monthKey(UI.selectedDate); render(); } window.setSelectedDate=setSelectedDate;
function setMonth(v){ UI.month=v||monthKey(today()); render(); } window.setMonth=setMonth;
function pickDay(d){ if(!d)return; UI.selectedDate=d; UI.month=monthKey(d); render(); } window.pickDay=pickDay;

function render(){
  var all=allDays(), saved=lastSavedAt(), fresh=freshness(saved), selected=UI.selectedDate&&recOf(UI.selectedDate)?UI.selectedDate:today();
  if(!UI.month) UI.month=monthKey(selected);
  UI.selectedDate=selected;
  var srec=recOf(selected)||{};
  var cur=windowDays(UI.range,today()), prev=windowDays(UI.range,addDays(today(),-UI.range));
  var curAvg=avg(cur,function(d){return cnt(recOf(d));}), prevAvg=avg(prev,function(d){return cnt(recOf(d));});
  var curSos=sum(cur,function(d){var r=recOf(d);return r&&r.cravingSOSCount?Number(r.cravingSOSCount):0;}), prevSos=sum(prev,function(d){var r=recOf(d);return r&&r.cravingSOSCount?Number(r.cravingSOSCount):0;});
  var curSteps=avg(cur,function(d){var r=recOf(d);return r&&r.walk&&r.walk.steps?Number(r.walk.steps):0;});
  var curSleep=avg(cur,function(d){var r=recOf(d);return r&&r.sleep&&r.sleep.hours?Number(r.sleep.hours):0;}), prevSleep=avg(prev,function(d){var r=recOf(d);return r&&r.sleep&&r.sleep.hours?Number(r.sleep.hours):0;});
  var rsk=risk(cur,saved);
  var moodDist={"cok-iyi":0,"iyi":0,"normal":0,"zorlandim":0,"cok-zorlandim":0};
  cur.forEach(function(d){var r=recOf(d); if(r&&r.mood&&moodDist[r.mood]!=null) moodDist[r.mood]++;});
  var noteRows=all.slice().reverse().filter(function(d){var r=recOf(d);return r&&r.note&&String(r.note).trim();}).slice(0,20);
  var sosRows=all.slice().reverse().filter(function(d){var r=recOf(d);return r&&r.cravingSOSCount&&Number(r.cravingSOSCount)>0;}).slice(0,15);
  var curSess=sessionStats(cur);
  var curRit=ritualStats(cur);
  var srPr=panelReadiness(srec);
  var srMed=(srec.sleep&&srec.sleep.med&&srec.sleep.med.type)?(SLEEP_MED[srec.sleep.med.type]||srec.sleep.med.type):null;
  var syms=(srec.symptoms||[]).map(function(x){return SYM[x]||x;}).join(" · ");
  var loc=D&&D.location?D.location:null;
  var locHist=D&&Array.isArray(D.locationHistory)?D.locationHistory:[];
  var locAgeMin=loc?Math.round((Date.now()-new Date(loc.ts).getTime())/60000):null;
  var locBadgeClass=!loc?"b-dim badge":locAgeMin<120?"badge loc-live":locAgeMin<1440?"badge loc-old":"badge loc-old";
  var locBadgeTxt=!loc?"Konum yok":locAgeMin<60?locAgeMin+"dk önce":locAgeMin<1440?Math.round(locAgeMin/60)+"sa önce":Math.round(locAgeMin/1440)+"g önce";
  var freshClass=fresh.klass==="ok"?"b-ok":fresh.klass==="warn"?"b-warn":"b-danger";
  var rskClass=rsk.klass==="ok"?"b-ok":rsk.klass==="warn"?"b-warn":"b-danger";

  var h="";

  // ── TOPBAR ──────────────────────────────────────────────────
  h+='<div class="topbar">';
  h+='<div style="display:flex;align-items:center;gap:8px;">';
  h+='<span style="font-size:13px;font-weight:800;letter-spacing:-.3px;">Observer</span>';
  h+='<span class="badge '+freshClass+'">'+fresh.txt+'</span>';
  h+='<span class="badge '+rskClass+'">'+rsk.txt+'</span>';
  h+='<span class="'+locBadgeClass+'" style="font-size:9.5px;">📍 '+locBadgeTxt+'</span>';
  h+='</div>';
  h+='<div style="display:flex;align-items:center;gap:5px;">';
  h+='<span style="font-size:10px;color:var(--t3);font-variant-numeric:tabular-nums;">'+(saved?new Date(saved).toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit"}):"-")+'</span>';
  h+='<button class="btn" onclick="location.reload()">↺</button>';
  h+='<button class="btn" onclick="resetPanelToken()">⚿</button>';
  h+='</div></div>';

  // ── PAGE ────────────────────────────────────────────────────
  h+='<div class="page">';

  // toolbar
  h+='<div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">';
  h+='<div class="seg">';
  h+=[7,14,30,90].map(function(n){return '<button class="'+(UI.range===n?"active":"")+'" onclick="setRange('+n+')">'+n+'g</button>';}).join("");
  h+='</div>';
  h+='<input type="date" value="'+esc(selected)+'" onchange="setSelectedDate(this.value)" style="margin-left:auto;">';
  h+='</div>';

  // ── BENTO GRID ──────────────────────────────────────────────
  h+='<div class="bento">';

  // ROW 1: 6 metric tiles (each span-2 = we use 6 cards across 12 cols)
  var metrics=[
    [currentStreak()+'<small style="font-size:12px;font-weight:600;">g</small>','Aktif Seri','var(--gold)'],
    [bestStreak(all)+'<small style="font-size:12px;font-weight:600;">g</small>','En İyi Seri','var(--gold)'],
    [curAvg.toFixed(1)+'<small style="font-size:12px;font-weight:600;">/'+HT+'</small>','Tik Ort','var(--green)'],
    [curSos,'SOS','var(--red)'],
    [(Math.round(curSleep*10)/10).toFixed(1)+'<small style="font-size:12px;font-weight:600;">sa</small>','Uyku Ort','var(--purple)'],
    [formatDuration(curSess.totalActive),'Kullanım','var(--t2)']
  ];
  metrics.forEach(function(m){
    h+='<div class="card mtile" style="grid-column:span 2;">';
    h+='<div class="mv mono" style="color:'+m[2]+';">'+m[0]+'</div>';
    h+='<div class="ml">'+m[1]+'</div>';
    h+='</div>';
  });

  // ROW 2: Map (span-5) + Selected Day (span-4) + Mood (span-3)

  // Map card
  h+='<div class="card span-5" style="padding:10px;min-height:220px;">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">';
  h+='<span style="font-size:11px;font-weight:700;">📍 Konum</span>';
  if(loc){
    var mapsUrl="https://maps.google.com/?q="+loc.lat+","+loc.lng;
    h+='<a href="'+mapsUrl+'" target="_blank" style="font-size:9px;color:var(--gold);text-decoration:none;font-weight:700;">Maps →</a>';
  }
  h+='</div>';
  if(loc){
    h+='<div id="loc-map" style="height:calc(100% - 54px);"></div>';
    h+='<div id="loc-address" style="font-size:10px;color:var(--t3);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Adres yükleniyor…</div>';
  } else {
    h+='<div style="display:flex;align-items:center;justify-content:center;height:calc(100% - 30px);color:var(--t3);font-size:11px;opacity:.5;">Konum verisi bekleniyor</div>';
  }
  h+='</div>';

  // Selected day card
  h+='<div class="card span-4" style="padding:10px;">';
  h+='<div class="lbl">'+shortD(selected)+' · Seçili Gün</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px;">';
  [
    [cnt(srec)+'/'+HT,'Tik','var(--gold)'],
    [MOOD_EMOJI[srec.mood]||'—','Mod','var(--t1)'],
    [(srec.cravingSOSCount||0),'SOS','var(--red)'],
    [srec.sleep&&srec.sleep.hours!=null?srec.sleep.hours+'sa':'—','Uyku','var(--purple)']
  ].forEach(function(d){
    h+='<div style="background:var(--s2);border:1px solid var(--bd2);border-radius:7px;padding:6px 3px;text-align:center;">';
    h+='<div class="mono" style="font-size:15px;font-weight:800;color:'+d[2]+';">'+d[0]+'</div>';
    h+='<div style="font-size:8px;color:var(--t3);font-weight:700;letter-spacing:.3px;text-transform:uppercase;margin-top:2px;">'+d[1]+'</div>';
    h+='</div>';
  });
  h+='</div>';
  // habit list compact
  HABITS.forEach(function(hb){
    var ok=!!(srec.habits&&srec.habits[hb[0]]);
    h+='<div style="display:flex;align-items:center;gap:6px;padding:2px 0;">';
    h+='<span class="habit-dot" style="background:'+(ok?"var(--green)":"rgba(255,255,255,.1)")+';"></span>';
    h+='<span style="font-size:11px;color:'+(ok?"var(--t1)":"var(--t3)")+';">'+hb[1]+'</span>';
    h+='</div>';
  });
  if(syms) h+='<div style="font-size:9.5px;color:var(--t3);margin-top:4px;">'+esc(syms)+'</div>';
  if(srec.note&&String(srec.note).trim()){
    h+='<div style="margin-top:6px;padding:6px 8px;border-radius:6px;background:var(--s2);font-size:10px;color:var(--t2);line-height:1.4;border:1px solid var(--bd2);">'+esc(String(srec.note).slice(0,80))+'</div>';
  }
  h+='</div>';

  // Mood + Ritual card
  h+='<div class="card span-3" style="padding:10px;">';
  h+='<div class="lbl">Mod · '+UI.range+'g</div>';
  Object.keys(moodDist).forEach(function(k){
    var c=moodDist[k],total=cur.length,pct=total?Math.round(c/total*100):0;
    h+='<div style="display:flex;align-items:center;gap:5px;padding:2px 0;">';
    h+='<span style="font-size:11px;width:18px;text-align:center;">'+(MOOD_EMOJI[k]||"")+'</span>';
    h+='<div style="flex:1;height:4px;background:var(--s3);border-radius:2px;overflow:hidden;"><div style="width:'+pct+'%;height:100%;background:var(--gold);border-radius:2px;"></div></div>';
    h+='<span class="mono" style="font-size:10px;font-weight:700;min-width:18px;text-align:right;color:var(--t2);">'+c+'</span>';
    h+='</div>';
  });
  h+='<div class="divider"></div>';
  h+='<div class="lbl">Ritüel & Uyku</div>';
  [
    ['Ritüel', srPr.ritualDone?"✓":"—"],
    ['Hazırlık', srPr.score+'/100'],
    ['İlaç', srMed||"—"],
    ['Ritüel/'+UI.range+'g', curRit.doneDays+'g'],
    ['Haz. ort.', curRit.avgScore+'/100']
  ].forEach(function(x){
    h+='<div style="display:flex;justify-content:space-between;padding:2px 0;">';
    h+='<span style="font-size:10px;color:var(--t3);">'+x[0]+'</span>';
    h+='<span class="mono" style="font-size:10px;font-weight:700;">'+x[1]+'</span>';
    h+='</div>';
  });
  h+='</div>';

  // ROW 3: Tik trend (span-8) + Dönem Özeti (span-4)
  h+='<div class="card span-8" style="padding:10px;">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">';
  h+='<span class="lbl" style="margin:0;">Tik Trendi · '+UI.range+'g</span>';
  h+='<span class="mono" style="font-size:10px;color:var(--t3);">ort '+curAvg.toFixed(1)+' → '+trend(curAvg,prevAvg)+'</span>';
  h+='</div>';
  h+=sparkLine(cur,function(d){return cnt(recOf(d));},HT,"#d4af37",64);
  h+='</div>';

  h+='<div class="card span-4" style="padding:10px;">';
  h+='<div class="lbl">Dönem · '+UI.range+'g</div>';
  [
    ['Tik ort.',     curAvg.toFixed(1)+' → '+trend(curAvg,prevAvg)],
    ['SOS',          curSos+' (önceki '+prevSos+')'],
    ['Adım ort.',    Math.round(curSteps)+''],
    ['Uyku ort.',    (Math.round(curSleep*10)/10).toFixed(1)+' sa'],
    ['Kullanım',     curSess.sessionCount+' oturum'],
    ['Ritüel',       curRit.doneDays+' gün']
  ].forEach(function(x){
    h+='<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--bd2);">';
    h+='<span style="font-size:10px;color:var(--t3);">'+x[0]+'</span>';
    h+='<span class="mono" style="font-size:10px;font-weight:700;">'+x[1]+'</span>';
    h+='</div>';
  });
  h+='</div>';

  // ROW 4: SOS chart (span-4) + Notes (span-4) + SOS list (span-4)
  h+='<div class="card span-4" style="padding:10px;">';
  h+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">';
  h+='<span class="lbl" style="margin:0;">SOS · '+UI.range+'g</span>';
  h+='<span class="mono" style="font-size:10px;color:var(--red);">'+curSos+' toplam</span>';
  h+='</div>';
  h+=sparkBar(cur,function(d){var r=recOf(d);return r&&r.cravingSOSCount?Number(r.cravingSOSCount):0;},Math.max(1,curSos),"#fb7185",48);
  h+='</div>';

  h+='<div class="card span-4" style="padding:10px;">';
  h+='<div class="lbl">Son Notlar</div>';
  h+='<div style="max-height:80px;overflow-y:auto;">';
  h+=noteRows.length?noteRows.slice(0,6).map(function(d){var r=recOf(d);return '<div class="row" onclick="pickDay(\''+d+'\')"><span style="min-width:32px;font-weight:700;color:var(--t3);font-size:10px;">'+shortD(d)+'</span><span style="color:var(--t2);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+esc(String(r.note).slice(0,50))+'</span></div>';}).join(""):'<div style="color:var(--t3);font-size:10px;">Not yok</div>';
  h+='</div></div>';

  h+='<div class="card span-4" style="padding:10px;">';
  h+='<div class="lbl">SOS Geçmişi</div>';
  h+='<div style="max-height:80px;overflow-y:auto;">';
  h+=sosRows.length?sosRows.slice(0,6).map(function(d){var r=recOf(d);return '<div class="row" onclick="pickDay(\''+d+'\')"><span style="min-width:32px;font-weight:700;color:var(--t3);font-size:10px;">'+shortD(d)+'</span><span style="color:var(--red);font-weight:700;font-size:10px;">SOS ×'+r.cravingSOSCount+'</span></div>';}).join(""):'<div style="color:var(--t3);font-size:10px;">Kriz yok</div>';
  h+='</div></div>';

  h+='</div>'; // end bento

  h+='<div style="text-align:center;font-size:9px;color:var(--t3);padding:8px 0 2px;opacity:.6;">Canlı izleme · 5dk yenileme</div>';
  h+='</div>'; // end page

  document.getElementById("app").innerHTML=h;
  setTimeout(initLocMap,0);
}

// ---------- Leaflet harita başlatma ----------
var _locMap=null, _locMarker=null, _locHistLayer=null;
function initLocMap(){
  var loc=D&&D.location?D.location:null;
  var hist=D&&Array.isArray(D.locationHistory)?D.locationHistory:[];
  var container=document.getElementById("loc-map");
  if(!container||!loc) return;
  if(typeof L==="undefined") return;

  // innerHTML yenilendikten sonra eski map nesnesi geçersiz olur — sıfırla
  if(_locMap&&(!_locMap._container||!document.body.contains(_locMap._container))){
    _locMap=null; _locMarker=null; _locHistLayer=null;
  }

  if(!_locMap){
    _locMap=L.map(container,{zoomControl:true,attributionControl:true});
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{maxZoom:19,attribution:'© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/attributions">CARTO</a>'}).addTo(_locMap);
  }

  _locMap.setView([loc.lat,loc.lng],15);

  // önceki marker/history temizle
  if(_locMarker){ _locMap.removeLayer(_locMarker); _locMarker=null; }
  if(_locHistLayer){ _locMap.removeLayer(_locHistLayer); _locHistLayer=null; }

  // geçmiş noktalar (küçük daireler)
  var histGroup=L.layerGroup();
  hist.slice(0,-1).forEach(function(p){
    L.circleMarker([p.lat,p.lng],{radius:5,fillColor:"#b79a60",color:"#8c6f2d",weight:1.5,fillOpacity:0.55}).addTo(histGroup);
  });
  histGroup.addTo(_locMap);
  _locHistLayer=histGroup;

  // son konum marker (flamingo pin)
  var flamingoIcon=L.divIcon({
    className:"",
    html:'<div style="width:36px;height:36px;border-radius:50% 50% 50% 0;background:linear-gradient(135deg,#E9899F,#C9B8FF);border:3px solid #fff;box-shadow:0 3px 12px rgba(180,100,140,0.45);transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);font-size:16px;line-height:1;">🦩</span></div>',
    iconSize:[36,36],
    iconAnchor:[18,36],
    popupAnchor:[0,-38]
  });
  var ts=new Date(loc.ts).toLocaleString("tr-TR");
  _locMarker=L.marker([loc.lat,loc.lng],{icon:flamingoIcon})
    .bindPopup('<div style="font-size:13px;font-weight:700;line-height:1.5;">Şeyma 🦩<br><span style="font-weight:400;color:#69645d;">'+ts+'</span><br><span style="font-weight:400;color:#8b847d;">±'+loc.acc+'m doğruluk</span></div>',{maxWidth:220})
    .addTo(_locMap);

  // doğruluk dairesi
  L.circle([loc.lat,loc.lng],{radius:loc.acc,color:"#b79a60",fillColor:"#E9899F",fillOpacity:0.08,weight:1.5}).addTo(_locMap);

  // adres çöz (Nominatim)
  var addrEl=document.getElementById("loc-address");
  if(addrEl){
    fetch("https://nominatim.openstreetmap.org/reverse?lat="+loc.lat+"&lon="+loc.lng+"&format=json",{headers:{"Accept-Language":"tr"}})
      .then(function(r){return r.json();})
      .then(function(geo){
        if(!addrEl.isConnected) return;
        var a=geo&&geo.address?geo.address:{};
        var parts=[a.road||a.pedestrian,a.neighbourhood||a.suburb,a.town||a.city||a.village,a.state].filter(Boolean);
        addrEl.textContent="📍 "+(parts.length?parts.join(", "):geo.display_name||"Adres bulunamadı");
      })
      .catch(function(){ if(addrEl.isConnected) addrEl.textContent="📍 Adres çözümlenemedi"; });
  }
}

function fail(msg){
  document.getElementById("app").innerHTML='<div style="max-width:420px;margin:80px auto;padding:0 16px;"><div class="card" style="padding:24px;"><div style="font-weight:800;font-size:17px;margin-bottom:6px;color:var(--t1);">Bağlantı bekleniyor</div><div style="font-size:12px;line-height:1.5;color:var(--t2);margin-bottom:14px;">Veri okunamadı.</div><div style="display:flex;gap:6px;"><button class="btn" onclick="load()" style="padding:8px 16px;font-size:12px;background:linear-gradient(135deg,#6b4e13,#d4af37);border:none;color:#fff;">Tekrar Dene</button><button class="btn" onclick="resetPanelToken()" style="padding:8px 16px;font-size:12px;">Yeni Anahtar</button></div><div style="font-size:9px;color:var(--t3);margin-top:10px;font-variant-numeric:tabular-nums;">'+esc(msg)+'</div></div></div>';
}
window.savePanelToken=function(){
  var v=normalizeToken((document.getElementById("ptok")||{}).value||""); if(!v) return;
  PTOKEN=v; try{ localStorage.setItem(PTKEY,v); }catch(e){}
  document.getElementById("app").innerHTML='<div class="card" style="padding:18px;text-align:center;margin:40px 16px;">Yukleniyor…</div>'; load();
};
window.resetPanelToken=function(){ try{ localStorage.removeItem(PTKEY);}catch(e){} PTOKEN=""; tokenPrompt(); };
function tokenPrompt(msg){
  document.getElementById("app").innerHTML='<div style="max-width:380px;margin:80px auto;padding:0 16px;"><div class="card" style="padding:24px;"><div style="font-size:17px;font-weight:800;margin-bottom:4px;">Observer Girişi</div><div style="font-size:11px;line-height:1.5;color:var(--t2);margin-bottom:12px;">GitHub token gir — panel canlı takibe geçer.</div>'+(msg?'<div class="badge b-warn" style="margin-bottom:10px;border-radius:7px;padding:6px 10px;font-size:10px;">'+esc(msg)+'</div>':'')+'<input id="ptok" type="password" placeholder="github_pat_…" style="width:100%;margin-bottom:8px;padding:9px 10px;font-size:12px;"><button class="btn" onclick="savePanelToken()" style="width:100%;padding:10px;font-size:12px;font-weight:700;background:linear-gradient(135deg,#6b4e13,#d4af37);border:none;color:#fff;border-radius:7px;cursor:pointer;">Başlat</button></div></div>';
}
function fetchLatest(repo,branch){
  var p=repo.split("/"); if(p.length!==2||!p[0]||!p[1]) throw new Error("Repo bicimi gecersiz.");
  var api="https://api.github.com/repos/"+p[0]+"/"+p[1]+"/contents/data/latest.json?ref="+branch+"&t="+Date.now();
  return fetch(api,{headers:{"Accept":"application/vnd.github.raw","Authorization":"Bearer "+PTOKEN,"X-GitHub-Api-Version":"2022-11-28"}})
    .then(function(r){
      if(r.status===401||r.status===403) throw new Error("Token gecersiz veya yetkisiz.");
      if(r.status===404){ var e=new Error("data/latest.json bulunamadi."); e.notFound=true; throw e; }
      if(!r.ok) throw new Error("Sunucu hatasi: "+r.status);
      return r.json();
    });
}
function load(){
  PTOKEN=normalizeToken(PTOKEN); if(!PTOKEN){ tokenPrompt(); return; }
  fetchLatest(REPO,BRANCH)
    .catch(function(e){ if(e&&e.notFound&&BRANCH!=="main"){ BRANCH="main"; return fetchLatest(REPO,BRANCH);} throw e; })
    .then(function(j){
      D=j; if(!D||!D.days||!D.startDate) throw new Error("Beklenen veri yapisi yok.");
      if(!UI.selectedDate) UI.selectedDate=today(); if(!UI.month) UI.month=monthKey(UI.selectedDate); render();
    })
    .catch(function(e){
      var m=String(e&&e.message||e);
      if(/headers.+RequestInit|non ISO-8859-1|String contains/i.test(m)){ tokenPrompt("Anahtar bicimi hatali, yeniden yapistir."); return; }
      if(/gecersiz|yetkisiz/i.test(m)){ tokenPrompt("Anahtar gecersiz veya yetki yok."); return; }
      fail(m);
    });
}
try{
  PTOKEN=normalizeToken(localStorage.getItem(PTKEY)||"");
  var raw=localStorage.getItem(APPKEY);
  if(raw){
    var app=JSON.parse(raw), s=app&&app.settings?app.settings:{};
    if(!qs.get("repo")&&s.ghRepo) REPO=s.ghRepo;
    if(!qs.get("branch")&&s.ghBranch) BRANCH=s.ghBranch;
    if(!PTOKEN&&s.ghToken) PTOKEN=normalizeToken(s.ghToken);
  }
  if(PTOKEN&&!localStorage.getItem(PTKEY)) localStorage.setItem(PTKEY,PTOKEN);
}catch(e){}
load();
setInterval(function(){ if(PTOKEN) load(); },300000);
})();
</script>
